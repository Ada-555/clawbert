<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawbert — Connection Debug</title>
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #0a0a0f; color: #fff; padding: 40px; }
        .error { color: #ff6b6b; background: rgba(255,107,107,0.1); padding: 20px; border-radius: 8px; margin: 20px 0; }
        .success { color: #00ff00; background: rgba(0,255,0,0.1); padding: 20px; border-radius: 8px; margin: 20px 0; }
        pre { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; overflow-x: auto; }
        h1 { color: #ff6b9d; }
        a { color: #00ffff; }
    </style>
</head>
<body>
    <h1>🦞 Clawbert Connection Test</h1>
    
    <div id="results"></div>
    
    <script>
        const gatewayHost = '100.67.153.88';
        const gatewayPort = '18789';
        const wsUrl = 'ws://' + gatewayHost + ':' + gatewayPort;
        
        const results = document.getElementById('results');
        
        function log(msg, type) {
            const div = document.createElement('div');
            div.className = type || '';
            div.textContent = msg;
            results.appendChild(div);
            console.log(msg);
        }
        
        log('Testing WebSocket connection to: ' + wsUrl, '');
        
        try {
            const ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                log('✅ WebSocket connection opened!', 'success');
                log('Gateway is reachable from browser.', 'success');
                ws.close();
            };
            
            ws.onerror = (error) => {
                log('❌ WebSocket error: ' + (error.type || 'Connection failed'), 'error');
                log('', '');
                log('This means the gateway is NOT accessible from your browser.', 'error');
                log('', '');
                log('Possible causes:', '');
                log('1. Gateway only listens on localhost (127.0.0.1)', '');
                log('2. Firewall blocking the connection', '');
                log('3. Gateway bind set to "loopback" only', '');
            };
            
            ws.onclose = (event) => {
                if (event.code !== 1000) {
                    log('Connection closed with code: ' + event.code, 'error');
                }
            };
            
        } catch (e) {
            log('❌ Exception: ' + e.message, 'error');
        }
        
        // Test HTTP fallback
        log('', '');
        log('Testing HTTP connection...', '');
        
        fetch('http://' + gatewayHost + ':' + gatewayPort + '/api/status', { mode: 'cors' })
            .then(r => r.ok ? log('✅ HTTP reachable!') : log('❌ HTTP failed: ' + r.status))
            .catch(e => log('❌ HTTP error: ' + e.message, 'error'));
    </script>
</body>
</html>
